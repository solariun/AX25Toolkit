# =============================================================================
# CI — Build + Test on every push and pull request
#
# Matrix:
#   Ubuntu 22.04  — g++      (C++11 library, C++17 test binary)
#   Ubuntu 22.04  — clang++  (same flags)
#   macOS latest  — clang++  (Apple Clang; GoogleTest from Homebrew uses libc++)
#
# NOTE on macOS ABI: the GoogleTest bottle from Homebrew is compiled with
# Apple Clang (libc++).  Linking it with Homebrew GCC (libstdc++) produces
# undefined symbol errors.  We therefore use clang++ on macOS for the test
# binary, while the library itself is compiled with the matrix compiler.
# =============================================================================
name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build-and-test:
    name: ${{ matrix.os }} / ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            compiler: g++
          - os: ubuntu-22.04
            compiler: clang++
          - os: macos-latest
            compiler: clang++   # Apple Clang matches Homebrew GoogleTest ABI

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Install GoogleTest (Ubuntu) ─────────────────────────────────────────
      - name: Install GoogleTest (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libgtest-dev

      # ── Install GoogleTest (macOS) ───────────────────────────────────────────
      - name: Install GoogleTest (macOS)
        if: runner.os == 'macOS'
        run: brew install googletest

      # ── Build library + binaries with C++11 ─────────────────────────────────
      - name: Build (C++11)
        run: make all CXX=${{ matrix.compiler }}

      # ── Compile & run all 43 unit tests ──────────────────────────────────────
      - name: Test
        run: make test CXX=${{ matrix.compiler }}

      # ── Upload binary on failure for post-mortem ─────────────────────────────
      - name: Upload test binary on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-failure-${{ matrix.os }}-${{ matrix.compiler }}
          path: test_ax25lib
          retention-days: 7
          if-no-files-found: ignore
